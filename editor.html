<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片拼图</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Tahoma,"PingFang SC","Microsoft Yahei",Arial,sans-serif;
  font-size:14px;line-height:1.5;padding:16px;background:#f5f6f7;color:#1f2329;
}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#e0e0e0;}.card{background:#252525;border-color:#434343;}select{background:#2a2a2a;border-color:#434343;color:#e0e0e0;}}
.title{font-size:16px;font-weight:600;margin-bottom:2px;}
.sub{font-size:12px;color:#646a73;margin-bottom:16px;}
.card{background:#fff;border:1px solid #dee0e3;border-radius:6px;padding:14px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;color:#646a73;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
label{display:block;font-size:12px;color:#646a73;margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
select{width:100%;background:#fff;border:1px solid #dee0e3;border-radius:6px;color:#1f2329;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;transition:border-color .15s;}
select:focus{border-color:rgb(20,86,240);}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 16px;border-radius:6px;border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;margin-top:12px;}
.btn-primary{background:rgb(20,86,240);color:#fff;}
.btn-primary:hover{opacity:.88;}
.status{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:6px;font-size:12px;margin-top:10px;}
.s-ok{background:#f0faf0;color:#2ea121;border:1px solid rgba(46,161,33,.2);}
.s-err{background:#fff0f0;color:#f54a45;border:1px solid rgba(245,74,69,.2);}
.s-info{background:#f0f4ff;color:rgb(20,86,240);border:1px solid rgba(20,86,240,.2);}
.s-warn{background:#fffbf0;color:#f5a623;border:1px solid rgba(245,166,35,.2);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.s-ok .sdot{background:#2ea121;}.s-err .sdot{background:#f54a45;}.s-info .sdot{background:rgb(20,86,240);}.s-warn .sdot{background:#f5a623;}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;}
.img-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid #dee0e3;position:relative;}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.img-thumb-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hint{text-align:center;color:#bbbfc4;font-size:13px;padding:20px 0 8px;}
.hint-icon{font-size:28px;margin-bottom:6px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="title">🖼 图片拼图</div>
<p class="sub">点击含图片的行 → 自动加载 → 画布编排 → 保存</p>

<div class="card">
  <div class="card-title">字段配置</div>
  <label>来源字段（附件/图片）</label>
  <select id="sel-src" onchange="window.__plugin.onSrcChange()">
    <option value="">-- 初始化中 --</option>
  </select>
  <label>保存结果到字段（附件）</label>
  <select id="sel-dst">
    <option value="">-- 初始化中 --</option>
  </select>
  <div id="cfg-status" class="hidden"></div>
</div>

<div class="card">
  <div class="card-title">图片预览</div>
  <div id="hint" class="hint">
    <div class="hint-icon">👆</div>
    请点击表格中含图片的行
  </div>
  <div id="img-status" class="hidden"></div>
  <div id="img-grid" class="img-grid"></div>
  <button id="btn-editor" class="btn btn-primary hidden" onclick="window.__plugin.openEditor()">
    🎨 打开画布编辑器
  </button>
</div>

<script type="module" src="./src/index.js"></script>
</body>
</html>
