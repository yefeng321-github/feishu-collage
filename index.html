<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片拼图</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft Yahei",Arial,sans-serif;font-size:14px;line-height:1.5;background:#f5f6f7;color:#1f2329;}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#e0e0e0;}.card{background:#252525!important;border-color:#434343!important;}select{background:#2a2a2a!important;border-color:#434343!important;color:#e0e0e0!important;}}
#sidebar{padding:16px;}
.title{font-size:16px;font-weight:600;margin-bottom:2px;}
.sub{font-size:12px;color:#646a73;margin-bottom:16px;}
.card{background:#fff;border:1px solid #dee0e3;border-radius:6px;padding:14px;margin-bottom:12px;}
.ct{font-size:11px;font-weight:600;color:#646a73;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
label{display:block;font-size:12px;color:#646a73;margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
select{width:100%;background:#fff;border:1px solid #dee0e3;border-radius:6px;color:#1f2329;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
select:focus{border-color:rgb(20,86,240);}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 16px;border-radius:6px;border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;margin-top:12px;}
.bp{background:rgb(20,86,240);color:#fff;}.bp:hover{opacity:.88;}
.st{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:6px;font-size:12px;margin-top:10px;}
.ok{background:#f0faf0;color:#2ea121;border:1px solid rgba(46,161,33,.2);}
.er{background:#fff0f0;color:#f54a45;border:1px solid rgba(245,74,69,.2);}
.if{background:#f0f4ff;color:rgb(20,86,240);border:1px solid rgba(20,86,240,.2);}
.wn{background:#fffbf0;color:#f5a623;border:1px solid rgba(245,166,35,.2);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.ok .dot{background:#2ea121;}.er .dot{background:#f54a45;}.if .dot{background:rgb(20,86,240);}.wn .dot{background:#f5a623;}
.imggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;}
.th{aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid #dee0e3;position:relative;background:#f5f6f7;}
.th img{width:100%;height:100%;object-fit:cover;display:block;}
.thn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hint{text-align:center;color:#bbbfc4;font-size:13px;padding:20px 0 8px;}
.hint-i{font-size:28px;margin-bottom:6px;}
.hidden{display:none!important;}
.ba{background:#2ea121;color:#fff;}.ba:hover{opacity:.88;}
#editor{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;background:#f0f1f3;}
#editor.open{display:flex;}
#etb{display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:6px 10px;flex-shrink:0;background:#fff;border-bottom:1px solid #dee0e3;}
.etbr{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.esep{width:1px;height:20px;background:#dee0e3;margin:0 2px;flex-shrink:0;}
.et{display:inline-flex;align-items:center;gap:3px;padding:5px 9px;border-radius:6px;border:1px solid transparent;background:transparent;color:#1f2329;font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap;}
.et:hover{background:#ebebeb;}.et.pri{background:rgb(20,86,240);color:#fff;}.et.pri:hover{opacity:.88;}
.et.da{color:#f54a45;}.et.da:hover{background:rgba(245,74,69,.08);}.et.active{background:rgb(20,86,240);color:#fff;}
.ei{background:#f5f6f7;border:1px solid #dee0e3;border-radius:5px;color:#1f2329;padding:3px 5px;font-size:12px;font-family:inherit;outline:none;width:44px;text-align:center;}
.ei:focus{border-color:rgb(20,86,240);}
.el2{font-size:11px;color:#646a73;white-space:nowrap;}
#ebody{display:flex;flex:1;overflow:hidden;}
#elp{width:110px;background:#fff;border-right:1px solid #dee0e3;overflow-y:auto;flex-shrink:0;}
.lpt{font-size:11px;font-weight:600;color:#646a73;text-transform:uppercase;letter-spacing:.06em;padding:10px 10px 6px;}
.li{padding:5px 7px;cursor:grab;border-radius:5px;margin:2px 4px;}
.li:hover{background:#ebebeb;}
.li img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;border:1px solid #dee0e3;display:block;pointer-events:none;}
.ln{font-size:10px;color:#646a73;text-align:center;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ecw{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f0f1f3;background-image:linear-gradient(#dee0e3 1px,transparent 1px),linear-gradient(90deg,#dee0e3 1px,transparent 1px);background-size:24px 24px;user-select:none;}
#ecv{position:relative;box-shadow:0 4px 24px rgba(0,0,0,.12);overflow:hidden;}
.cel{position:absolute;cursor:move;user-select:none;}
.cel.sel{outline:2px solid rgb(20,86,240);}
.cel img{width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;}
.hdl{position:absolute;width:9px;height:9px;background:#fff;border:2px solid rgb(20,86,240);border-radius:2px;z-index:10;display:none;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.cel.sel .hdl{display:block;}
.hdl.tl{top:-5px;left:-5px;cursor:nw-resize;}.hdl.tr{top:-5px;right:-5px;cursor:ne-resize;}
.hdl.bl{bottom:-5px;left:-5px;cursor:sw-resize;}.hdl.br{bottom:-5px;right:-5px;cursor:se-resize;}
.hdl.rot{top:-24px;left:calc(50% - 4px);cursor:grab;background:#7b61ff;border-color:#7b61ff;}
.ctxt{position:absolute;cursor:move;user-select:none;padding:3px 6px;border-radius:3px;min-width:50px;min-height:22px;white-space:pre-wrap;word-break:break-all;line-height:1.4;}
.ctxt.sel{outline:2px solid #7b61ff;}.ctxt.edit{outline:2px solid #2ea121;cursor:text;}
#erp{width:150px;background:#fff;border-left:1px solid #dee0e3;padding:10px;overflow-y:auto;flex-shrink:0;}
.prs{margin-bottom:12px;}.prt{font-size:10px;font-weight:600;color:#646a73;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.prr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:4px;}
.prl{font-size:11px;color:#646a73;}
.pri{background:#f5f6f7;border:1px solid #dee0e3;border-radius:4px;color:#1f2329;padding:3px 5px;font-size:11px;font-family:inherit;outline:none;width:66px;text-align:right;}
.pri:focus{border-color:rgb(20,86,240);}
input[type=color].pri{padding:1px 2px;height:24px;cursor:pointer;}
input[type=range].pri{padding:0;height:18px;cursor:pointer;accent-color:rgb(20,86,240);}
.ns{font-size:12px;color:#646a73;text-align:center;padding:20px 0;}
#esb{height:24px;background:#fff;border-top:1px solid #dee0e3;display:flex;align-items:center;padding:0 10px;gap:14px;flex-shrink:0;font-size:11px;color:#646a73;overflow:hidden;}
#prog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;align-items:center;justify-content:center;}
#prog.open{display:flex;}
.pb{background:#fff;border:1px solid #dee0e3;border-radius:10px;padding:24px 28px;min-width:240px;text-align:center;}
.pb h3{font-size:14px;margin-bottom:12px;}.ptb{height:4px;background:#ebebeb;border-radius:99px;overflow:hidden;}
.pf{height:100%;background:rgb(20,86,240);border-radius:99px;transition:width .3s;}.pm{font-size:12px;color:#646a73;margin-top:8px;}
</style>
</head>
<body>

<div id="sidebar">
  <div class="title">🖼 图片拼图</div>
  <p class="sub">点击含图片的行 → 自动加载 → 画布编排 → 保存</p>
  <div class="card">
    <div class="ct">字段配置</div>
    <label>来源字段（附件/图片）</label>
    <select id="sel-src" onchange="onSrcChange()"><option value="">-- 初始化中 --</option></select>
    <label>保存结果到字段（附件）</label>
    <select id="sel-dst"><option value="">-- 初始化中 --</option></select>
    <div id="cfg-st" class="hidden"></div>
  </div>
  <div class="card">
    <div class="ct">图片预览</div>
    <div id="hint" class="hint"><div class="hint-i">👆</div>请点击表格中含图片的行</div>
    <div id="img-st" class="hidden"></div>
    <div id="imggrid" class="imggrid"></div>
    <button id="btn-auto" class="btn ba hidden" onclick="autoCollage()">⚡ 一键自动拼接并保存</button>
    <button id="btn-ed" class="btn bp hidden" onclick="openEditor()">🎨 手动编辑画布</button>
  </div>
</div>

<div id="editor">
  <div id="etb">
    <div class="etbr">
      <span style="font-size:13px;font-weight:600;margin-right:4px;">🖼 画布</span>
      <div class="esep"></div>
      <button class="et" onclick="eAddText()">＋ 文字</button>
      <button class="et" onclick="eBringFwd()">↑ 上层</button>
      <button class="et" onclick="eSendBk()">↓ 下层</button>
      <button class="et da" onclick="eDelSel()">✕ 删除</button>
      <div class="esep"></div>
      <button class="et" onclick="eAutoLayout()">⊞ 自动排列</button>
      <div class="esep"></div>
      <button class="et" onclick="closeEditor()">← 返回</button>
      <button class="et pri" onclick="eSave()">⬆ 保存到飞书</button>
    </div>
    <div class="etbr" style="margin-top:4px;">
      <span class="el2">画布</span>
      <input class="ei" id="cvW" type="number" value="1200" onchange="eResizeCv()">
      <span class="el2">×</span>
      <input class="ei" id="cvH" type="number" value="900" onchange="eResizeCv()">
      <div class="esep"></div>
      <button class="et" onclick="ePreset(1200,900)">4:3</button>
      <button class="et" onclick="ePreset(1920,1080)">16:9</button>
      <button class="et" onclick="ePreset(1080,1080)">1:1</button>
      <button class="et" onclick="ePreset(1080,1920)">9:16</button>
      <div class="esep"></div>
      <span class="el2">背景</span>
      <input type="color" class="ei" id="cvBg" value="#ffffff" onchange="eSetBg()" style="width:32px;padding:1px 2px;height:26px;cursor:pointer;">
    </div>
  </div>
  <div id="ebody">
    <div id="elp"><div class="lpt">图片库</div><div id="elib"></div></div>
    <div id="ecw"><div id="ecv" style="width:1200px;height:900px;background:#fff;"></div></div>
    <div id="erp">
      <div id="ens" class="ns">选择元素<br>查看属性</div>
      <div id="eprops" style="display:none">
        <div class="prs">
          <div class="prt">变换</div>
          <div class="prr"><span class="prl">X</span><input class="pri" id="epx" type="number" onchange="eAp('x',+this.value)"></div>
          <div class="prr"><span class="prl">Y</span><input class="pri" id="epy" type="number" onchange="eAp('y',+this.value)"></div>
          <div class="prr"><span class="prl">W</span><input class="pri" id="epw" type="number" onchange="eAp('w',+this.value)"></div>
          <div class="prr"><span class="prl">H</span><input class="pri" id="eph" type="number" onchange="eAp('h',+this.value)"></div>
          <div class="prr"><span class="prl">旋转°</span><input class="pri" id="epr" type="number" onchange="eAp('r',+this.value)"></div>
        </div>
        <div class="prs"><div class="prt">透明度</div><div class="prr"><input class="pri" id="epo" type="range" min="0" max="1" step="0.01" onchange="eAp('o',+this.value)"></div></div>
        <div class="prs" id="etxtp" style="display:none">
          <div class="prt">文字</div>
          <div class="prr"><span class="prl">字号</span><input class="pri" id="epfs" type="number" value="24" min="8" onchange="eAtp('fs',+this.value)"></div>
          <div class="prr"><span class="prl">颜色</span><input class="pri" type="color" id="epfc" value="#000000" onchange="eAtp('fc',this.value)"></div>
          <div class="prr"><span class="prl">背景色</span><input class="pri" type="color" id="epbc" value="#ffffff" onchange="eAtp('bc',this.value)"></div>
          <div class="prr"><span class="prl">透明背景</span><input type="checkbox" id="epbt" onchange="eAtp('bt',this.checked)"></div>
          <div class="prr"><span class="prl">粗体</span><button class="et" id="epbold" onclick="eToggleBold()">B</button></div>
        </div>
      </div>
    </div>
  </div>
  <div id="esb"><span id="esb-el">元素: 0</span><span id="esb-cv">画布: 1200×900</span><span id="esb-msg">从左侧拖拽图片到画布</span></div>
</div>

<div id="prog"><div class="pb"><h3 id="pt">处理中…</h3><div class="ptb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pm" id="pm">请稍候</div></div></div>

<script type="module">
// 依次尝试多个 CDN，哪个能加载用哪个
async function loadSDK() {
  const cdns = [
    'https://esm.run/@lark-base-open/js-sdk',
    'https://esm.sh/@lark-base-open/js-sdk',
    'https://cdn.skypack.dev/@lark-base-open/js-sdk',
  ];
  for (const cdn of cdns) {
    try {
      const m = await import(cdn);
      if (m.bitable && m.bitable.base) {
        console.log('SDK loaded from:', cdn);
        return m;
      }
    } catch(e) {
      console.warn('CDN failed:', cdn, e.message);
    }
  }
  return null;
}

const sdk = await loadSDK();
if (!sdk) {
  document.getElementById('cfg-st').className = 'st er';
  document.getElementById('cfg-st').innerHTML = '<div class="dot"></div><span>SDK加载失败，请检查网络后刷新</span>';
  document.getElementById('cfg-st').classList.remove('hidden');
  throw new Error('SDK load failed');
}

const { bitable, FieldType } = sdk;

// ── 边栏 ──────────────────────────────────────────
const S = { table:null, tableId:null, recordId:null, images:[] };
const g = id => document.getElementById(id);
const showSt = (id,cls,msg) => { const e=g(id);e.className='st '+cls;e.innerHTML='<div class="dot"></div><span>'+msg+'</span>';e.classList.remove('hidden'); };
const hideSt = id => g(id).classList.add('hidden');

async function loadFields(table) {
  try {
    const fields = await table.getFieldMetaList();
    const att = fields.filter(f => f.type === FieldType.Attachment);
    if (!att.length) { showSt('cfg-st','wn','当前表没有附件字段'); return; }
    hideSt('cfg-st');
    const opts = att.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
    g('sel-src').innerHTML = opts; g('sel-dst').innerHTML = opts;
    g('sel-src').value = att[0].id;
    g('sel-dst').value = att.length > 1 ? att[1].id : att[0].id;
  } catch(e) { showSt('cfg-st','er','加载字段失败：'+e.message); }
}

async function loadImages(recordId) {
  const srcId = g('sel-src').value;
  if (!srcId || !S.table) return;
  g('hint').classList.add('hidden'); g('imggrid').innerHTML=''; g('btn-ed').classList.add('hidden'); g('btn-auto').classList.add('hidden');
  showSt('img-st','if','加载图片中…');
  try {
    const field = await S.table.getField(srcId);
    const atts = await field.getValue(recordId);
    if (!atts||!atts.length) { showSt('img-st','wn','该行没有附件'); return; }
    const urls = await field.getAttachmentUrls(recordId);
    S.images = atts.map((a,i)=>({name:a.name,url:urls[i]||'',type:a.type,token:a.token,size:a.size}))
      .filter(x=>x.url&&x.type&&x.type.startsWith('image/'));
    if (!S.images.length) { showSt('img-st','wn','没有图片格式的附件'); return; }
    S.images.forEach(img=>{
      const d=document.createElement('div'); d.className='th';
      d.innerHTML=`<img src="${img.url}" loading="lazy"><div class="thn">${img.name}</div>`;
      g('imggrid').appendChild(d);
    });
    showSt('img-st','ok',`✓ 已加载 ${S.images.length} 张图片，拼接中…`);
    g('btn-ed').classList.remove('hidden');
    g('btn-auto').classList.remove('hidden');
    // 自动触发拼接保存
    autoCollage();
  } catch(e) { showSt('img-st','er','加载失败：'+e.message); }
}

window.onSrcChange = () => { if(S.recordId) loadImages(S.recordId); };

// 网格列数：固定2列（超过1张都用2列网格）
function gridCols(n) { return n <= 1 ? 1 : 2; }

window.autoCollage = async () => {
  const dstId = g('sel-dst').value;
  if (!S.images.length) { alert('请先选择一行有图片的记录'); return; }
  if (!dstId) { alert('请先选择保存目标字段'); return; }

  showProg('自动拼接中…', 10, '计算布局…');

  const n = S.images.length;
  const cols = gridCols(n);
  // 行数：不足一排也按完整行算（1张=1行1列，2张=1行2列，3-4张=2行2列，5-6张=3行2列）
  const rows = cols === 1 ? 1 : Math.ceil(n / cols);

  // 画布固定 1:1，1200×1200
  const cvW = 1200, cvH = 1200;
  const pad = 8;
  const cellW = Math.floor((cvW - pad*(cols+1)) / cols);
  const cellH = Math.floor((cvH - pad*(rows+1)) / rows);

  setProg(20, '加载图片…');

  const off = document.createElement('canvas');
  off.width = cvW; off.height = cvH;
  const ctx = off.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cvW, cvH);

  await Promise.all(S.images.map((img, i) => new Promise(res => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = pad + col*(cellW+pad);
    const cy = pad + row*(cellH+pad);

    const el = new Image();
    el.crossOrigin = 'anonymous';
    el.onload = () => {
      // 保持原始比例，居中显示，空余处保持白色背景
      const ir = el.naturalWidth / el.naturalHeight;
      const tr = cellW / cellH;
      let dw, dh;
      if (ir > tr) { dw = cellW; dh = cellW / ir; }
      else { dh = cellH; dw = cellH * ir; }
      const dx = cx + (cellW - dw) / 2;
      const dy = cy + (cellH - dh) / 2;
      ctx.drawImage(el, 0, 0, el.naturalWidth, el.naturalHeight, dx, dy, dw, dh);
      res();
    };
    el.onerror = () => res();
    el.src = img.url;
  })));

  setProg(70, '保存到飞书…');

  try {
    const blob = await new Promise((res,rej) => off.toBlob(b=>b?res(b):rej(new Error('toBlob失败')),'image/png'));
    const file = new File([blob], 'collage_'+Date.now()+'.png', {type:'image/png'});
    const table = await bitable.base.getTable(S.tableId);
    const field = await table.getField(dstId);
    await field.setValue(S.recordId, file);
    setProg(100, '保存成功！');
    setTimeout(()=>{ hideProg(); showSt('img-st','ok','✓ 已自动拼接保存！'); }, 800);
  } catch(e) {
    hideProg();
    alert('保存失败：'+e.message);
  }
};
window.openEditor = () => {
  const dstId = g('sel-dst').value;
  if (!S.images.length) { alert('请先选择一行有图片的记录'); return; }
  eOpen(S.images, {tableId:S.tableId, recordId:S.recordId, dstFieldId:dstId});
};

// init
showSt('cfg-st','if','初始化中…');
try {
  const table = await bitable.base.getActiveTable();
  S.table=table; S.tableId=table.id; hideSt('cfg-st');
  await loadFields(table);
  bitable.base.onSelectionChange(async({data})=>{
    if(data.tableId&&data.tableId!==S.tableId){S.tableId=data.tableId;const t=await bitable.base.getTable(data.tableId);S.table=t;await loadFields(t);}
    if(data.recordId&&data.recordId!==S.recordId){S.recordId=data.recordId;await loadImages(data.recordId);}
  });
  const sel = await bitable.base.getSelection();
  if(sel.recordId){S.recordId=sel.recordId;await loadImages(sel.recordId);}
} catch(e) { showSt('cfg-st','er','初始化失败：'+e.message); }

// ── 画布编辑器 ────────────────────────────────────
let eEls=[],eSelId=null,eIdCtr=1,eCvW=1200,eCvH=900;
let eDrag=null,eResize=null,eRot=null,eCfg=null;
const ecv = g('ecv');

function eOpen(imgs,cfg) {
  eCfg=cfg; eEls=[]; eSelId=null; eIdCtr=1; ecv.innerHTML='';
  g('elib').innerHTML=''; g('ens').style.display=''; g('eprops').style.display='none'; eUpdSb();
  imgs.forEach((img,i)=>{
    const d=document.createElement('div'); d.className='li'; d.draggable=true;
    d.innerHTML=`<img src="${img.url}"><div class="ln">${img.name}</div>`;
    d.addEventListener('dragstart',e=>e.dataTransfer.setData('idx',i));
    g('elib').appendChild(d);
  });
  window._eImgs=imgs;
  g('editor').classList.add('open'); g('sidebar').style.display='none';
  eSetMsg('从左侧拖拽图片到画布 · 双击文字编辑 · Del删除');
}
window.closeEditor=()=>{g('editor').classList.remove('open');g('sidebar').style.display='';};
ecv.addEventListener('dragover',e=>e.preventDefault());
ecv.addEventListener('drop',e=>{
  e.preventDefault(); const idx=e.dataTransfer.getData('idx'); if(idx==='')return;
  const img=window._eImgs[+idx]; const r=ecv.getBoundingClientRect();
  eAddImg(img.url,img.name,e.clientX-r.left-100,e.clientY-r.top-75,200,150);
});
function eAddImg(url,name,x,y,w,h){const id=eIdCtr++;eEls.push({id,type:'img',url,name,x,y,w,h,r:0,o:1,z:eEls.length+1});eRenderEl(eEls[eEls.length-1]);eSel(id);eUpdSb();}
window.eAddText=()=>{const id=eIdCtr++;eEls.push({id,type:'txt',text:'双击编辑文字',x:Math.round(eCvW/2-80),y:Math.round(eCvH/2-15),w:200,h:40,r:0,o:1,z:eEls.length+1,fs:24,fc:'#000000',bc:'#ffffff',bt:false,bold:false});eRenderEl(eEls[eEls.length-1]);eSel(id);eUpdSb();};
function eRenderEl(e2){
  g('eel-'+e2.id)?.remove();
  const div=document.createElement('div'); div.id='eel-'+e2.id; div.className=e2.type==='txt'?'ctxt cel':'cel'; eSetXf(div,e2);
  if(e2.type==='img'){const img=document.createElement('img');img.src=e2.url;img.draggable=false;div.appendChild(img);}
  else{eSetTs(div,e2);div.textContent=e2.text;div.addEventListener('dblclick',ev=>{ev.stopPropagation();eStartEdit(e2.id);});}
  ['tl','tr','bl','br'].forEach(c=>{const h=document.createElement('div');h.className='hdl '+c;h.addEventListener('mousedown',ev=>{ev.stopPropagation();eStartResize(ev,e2.id,c);});div.appendChild(h);});
  const rh=document.createElement('div');rh.className='hdl rot';rh.addEventListener('mousedown',ev=>{ev.stopPropagation();eStartRot(ev,e2.id);});div.appendChild(rh);
  div.addEventListener('mousedown',ev=>{ev.stopPropagation();eStartDrag(ev,e2.id);});
  ecv.appendChild(div); eShowH(e2.id,e2.id===eSelId);
}
function eSetXf(d,e2){d.style.cssText=`left:${e2.x}px;top:${e2.y}px;width:${e2.w}px;height:${e2.h}px;transform:rotate(${e2.r}deg);opacity:${e2.o};z-index:${e2.z};position:absolute;`;}
function eSetTs(d,e2){d.style.fontSize=e2.fs+'px';d.style.color=e2.fc;d.style.backgroundColor=e2.bt?'transparent':e2.bc;d.style.fontWeight=e2.bold?'bold':'normal';}
ecv.addEventListener('mousedown',e=>{if(e.target===ecv)eDesel();});
function eSel(id){eDesel();eSelId=id;g('eel-'+id)?.classList.add('sel');eShowH(id,true);eUpdP();}
function eDesel(){if(eSelId!==null){g('eel-'+eSelId)?.classList.remove('sel');eShowH(eSelId,false);}eSelId=null;g('ens').style.display='';g('eprops').style.display='none';}
function eShowH(id,show){g('eel-'+id)?.querySelectorAll('.hdl').forEach(h=>h.style.display=show?'':'none');}
function eStartDrag(e,id){eSel(id);const e2=eG(id);eDrag={id,sx:e.clientX,sy:e.clientY,ox:e2.x,oy:e2.y};e.preventDefault();}
function eStartResize(e,id,c){eSel(id);const e2=eG(id);eResize={id,c,sx:e.clientX,sy:e.clientY,ox:e2.x,oy:e2.y,ow:e2.w,oh:e2.h};e.preventDefault();}
function eStartRot(e,id){eSel(id);const e2=eG(id);const d=g('eel-'+id);const r=d.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;eRot={id,cx,cy,sa:Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI,or:e2.r};e.preventDefault();}
document.addEventListener('mousemove',e=>{
  if(eDrag){const e2=eG(eDrag.id);e2.x=eDrag.ox+e.clientX-eDrag.sx;e2.y=eDrag.oy+e.clientY-eDrag.sy;const d=g('eel-'+eDrag.id);d.style.left=e2.x+'px';d.style.top=e2.y+'px';eUpdP();}
  if(eResize){const e2=eG(eResize.id);const dx=e.clientX-eResize.sx,dy=e.clientY-eResize.sy,c=eResize.c;let nx=eResize.ox,ny=eResize.oy,nw=eResize.ow,nh=eResize.oh;if(c==='br'){nw=Math.max(20,eResize.ow+dx);nh=Math.max(10,eResize.oh+dy);}else if(c==='bl'){nw=Math.max(20,eResize.ow-dx);nx=eResize.ox+dx;nh=Math.max(10,eResize.oh+dy);}else if(c==='tr'){nw=Math.max(20,eResize.ow+dx);nh=Math.max(10,eResize.oh-dy);ny=eResize.oy+dy;}else if(c==='tl'){nw=Math.max(20,eResize.ow-dx);nx=eResize.ox+dx;nh=Math.max(10,eResize.oh-dy);ny=eResize.oy+dy;}Object.assign(e2,{x:nx,y:ny,w:nw,h:nh});const d=g('eel-'+eResize.id);d.style.left=nx+'px';d.style.top=ny+'px';d.style.width=nw+'px';d.style.height=nh+'px';eUpdP();}
  if(eRot){const e2=eG(eRot.id);e2.r=Math.round(Math.atan2(e.clientY-eRot.cy,e.clientX-eRot.cx)*180/Math.PI-eRot.sa+eRot.or);g('eel-'+eRot.id).style.transform='rotate('+e2.r+'deg)';eUpdP();}
});
document.addEventListener('mouseup',()=>{eDrag=null;eResize=null;eRot=null;});
function eStartEdit(id){const e2=eG(id);const d=g('eel-'+id);d.classList.add('edit');d.contentEditable='true';d.focus();d.addEventListener('blur',()=>{d.contentEditable='false';d.classList.remove('edit');e2.text=d.textContent;},{once:true});}
function eUpdP(){
  if(eSelId===null)return;const e2=eG(eSelId);
  g('ens').style.display='none';g('eprops').style.display='';
  ['epx','epy','epw','eph','epr','epo'].forEach((id,i)=>g(id).value=String([Math.round(e2.x),Math.round(e2.y),Math.round(e2.w),Math.round(e2.h),Math.round(e2.r),e2.o][i]));
  const isTxt=e2.type==='txt';g('etxtp').style.display=isTxt?'':'none';
  if(isTxt){g('epfs').value=e2.fs;g('epfc').value=e2.fc;g('epbc').value=e2.bc||'#ffffff';g('epbt').checked=!!e2.bt;g('epbold').classList.toggle('active',!!e2.bold);}
}
window.eAp=(prop,val)=>{if(eSelId===null)return;const e2=eG(eSelId);e2[prop]=prop==='w'?Math.max(20,val):prop==='h'?Math.max(10,val):val;eSetXf(g('eel-'+eSelId),e2);};
window.eAtp=(prop,val)=>{if(eSelId===null)return;const e2=eG(eSelId);const d=g('eel-'+eSelId);if(prop==='fs'){e2.fs=val;d.style.fontSize=val+'px';}else if(prop==='fc'){e2.fc=val;d.style.color=val;}else if(prop==='bc'){e2.bc=val;if(!e2.bt)d.style.backgroundColor=val;}else if(prop==='bt'){e2.bt=val;d.style.backgroundColor=val?'transparent':e2.bc;}};
window.eToggleBold=()=>{if(eSelId===null)return;const e2=eG(eSelId);e2.bold=!e2.bold;g('eel-'+eSelId).style.fontWeight=e2.bold?'bold':'normal';g('epbold').classList.toggle('active',e2.bold);};
window.eBringFwd=()=>{if(eSelId===null)return;const e2=eG(eSelId);e2.z++;g('eel-'+eSelId).style.zIndex=e2.z;};
window.eSendBk=()=>{if(eSelId===null)return;const e2=eG(eSelId);e2.z=Math.max(1,e2.z-1);g('eel-'+eSelId).style.zIndex=e2.z;};
window.eDelSel=()=>{if(eSelId===null)return;g('eel-'+eSelId)?.remove();eEls=eEls.filter(e=>e.id!==eSelId);eSelId=null;g('ens').style.display='';g('eprops').style.display='none';eUpdSb();};
window.eResizeCv=()=>{eCvW=parseInt(g('cvW').value)||1200;eCvH=parseInt(g('cvH').value)||900;ecv.style.width=eCvW+'px';ecv.style.height=eCvH+'px';eUpdSb();};
window.ePreset=(w,h)=>{g('cvW').value=w;g('cvH').value=h;eResizeCv();};
window.eSetBg=()=>{ecv.style.background=g('cvBg').value;};
window.eAutoLayout=()=>{const imgs=eEls.filter(e=>e.type==='img');if(!imgs.length)return;const cols=Math.ceil(Math.sqrt(imgs.length)),pad=16;const w=Math.floor((eCvW-pad*(cols+1))/cols),h=Math.floor((eCvH-pad*(Math.ceil(imgs.length/cols)+1))/Math.ceil(imgs.length/cols));imgs.forEach((e2,i)=>{e2.x=pad+(i%cols)*(w+pad);e2.y=pad+Math.floor(i/cols)*(h+pad);e2.w=w;e2.h=h;e2.r=0;eSetXf(g('eel-'+e2.id),e2);});eSetMsg('已自动排列');};
function eRenderBlob(){return new Promise((res,rej)=>{const off=document.createElement('canvas');off.width=eCvW;off.height=eCvH;const ctx=off.getContext('2d');ctx.fillStyle=g('cvBg').value;ctx.fillRect(0,0,eCvW,eCvH);const sorted=[...eEls].sort((a,b)=>(a.z||1)-(b.z||1));let pending=sorted.filter(e=>e.type==='img').length;const finish=()=>{sorted.forEach(e2=>{if(e2.type!=='txt')return;ctx.save();ctx.globalAlpha=e2.o;ctx.translate(e2.x+e2.w/2,e2.y+e2.h/2);ctx.rotate(e2.r*Math.PI/180);if(!e2.bt){ctx.fillStyle=e2.bc||'#fff';ctx.fillRect(-e2.w/2,-e2.h/2,e2.w,e2.h);}ctx.font=(e2.bold?'bold ':'')+e2.fs+'px -apple-system,"PingFang SC",sans-serif';ctx.fillStyle=e2.fc||'#000';ctx.textBaseline='middle';const lines=e2.text.split('\n'),lh=e2.fs*1.4,tot=lines.length*lh;lines.forEach((l,i)=>ctx.fillText(l,-e2.w/2+6,-tot/2+lh*(i+0.5)));ctx.restore();});off.toBlob(b=>b?res(b):rej(new Error('toBlob失败')),'image/png');};if(pending===0){finish();return;}sorted.forEach(e2=>{if(e2.type!=='img')return;const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{ctx.save();ctx.globalAlpha=e2.o;ctx.translate(e2.x+e2.w/2,e2.y+e2.h/2);ctx.rotate(e2.r*Math.PI/180);ctx.drawImage(img,-e2.w/2,-e2.h/2,e2.w,e2.h);ctx.restore();if(--pending===0)finish();};img.onerror=()=>{if(--pending===0)finish();};img.src=e2.url;});});}
window.eSave=async()=>{
  if(!eCfg){alert('配置丢失，请返回重试');return;}
  showProg('渲染画布…',10,'合成图片中');
  try{
    const blob=await eRenderBlob();setProg(50,'上传到飞书…');
    const file=new File([blob],'collage_'+Date.now()+'.png',{type:'image/png'});
    const table=await bitable.base.getTable(eCfg.tableId);
    const field=await table.getField(eCfg.dstFieldId);
    await field.setValue(eCfg.recordId,file);
    setProg(100,'保存成功！');
    setTimeout(()=>{hideProg();eSetMsg('✓ 已保存到飞书！');},800);
  }catch(e){hideProg();alert('保存失败：'+e.message);}
};
function showProg(t,p,m){g('prog').classList.add('open');g('pt').textContent=t;setProg(p,m);}
function setProg(p,m){g('pf').style.width=p+'%';if(m)g('pm').textContent=m;}
function hideProg(){g('prog').classList.remove('open');}
function eG(id){return eEls.find(e=>e.id===id);}
function eUpdSb(){g('esb-el').textContent='元素: '+eEls.length;g('esb-cv').textContent='画布: '+eCvW+'×'+eCvH;}
function eSetMsg(m){g('esb-msg').textContent=m;}
document.addEventListener('keydown',e=>{
  if(!g('editor').classList.contains('open'))return;
  if(e.target.contentEditable==='true')return;
  if(e.key==='Delete'||e.key==='Backspace')eDelSel();
  if(e.key==='Escape')eDesel();
  if(eSelId===null)return;
  const e2=eG(eSelId),d=g('eel-'+eSelId),s=e.shiftKey?10:1;
  if(e.key==='ArrowLeft'){e2.x-=s;d.style.left=e2.x+'px';eUpdP();e.preventDefault();}
  if(e.key==='ArrowRight'){e2.x+=s;d.style.left=e2.x+'px';eUpdP();e.preventDefault();}
  if(e.key==='ArrowUp'){e2.y-=s;d.style.top=e2.y+'px';eUpdP();e.preventDefault();}
  if(e.key==='ArrowDown'){e2.y+=s;d.style.top=e2.y+'px';eUpdP();e.preventDefault();}
});
</script>
</body>
