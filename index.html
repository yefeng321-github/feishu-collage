<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片拼图</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--bd:#2e2e3e;
  --ac:#4f7cff;--tx:#e8e8f0;--tx2:#8080a8;
  --ok:#34d399;--er:#f87171;--r:8px;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.6;padding:14px;min-height:100vh;}
.logo{font-size:15px;font-weight:700;color:var(--ac);margin-bottom:2px;}
.sub{font-size:11px;color:var(--tx2);margin-bottom:16px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.ct{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
label{display:block;font-size:11px;color:var(--tx2);margin-bottom:3px;margin-top:9px;}
label:first-of-type{margin-top:0;}
select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:7px 9px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
select:focus{border-color:var(--ac);}
select option{background:#1a1a22;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:none;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.bp{background:var(--ac);color:#fff;}
.bp:hover{opacity:.87;}
.bf{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.brow{display:flex;gap:7px;margin-top:11px;}
.st{display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:6px;font-size:11px;margin-top:8px;}
.st.ok{background:#0d2b1e;color:var(--ok);border:1px solid #1a4a33;}
.st.er{background:#2b0d0d;color:var(--er);border:1px solid #4a1a1a;}
.st.if{background:#0f1e38;color:#93c5fd;border:1px solid #1e3a5f;}
.st.wn{background:#2b1d00;color:#fbbf24;border:1px solid #4a3200;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.st.ok .dot{background:var(--ok);}
.st.er .dot{background:var(--er);}
.st.if .dot{background:#93c5fd;}
.st.wn .dot{background:#fbbf24;}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;}
.th{aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--bd);background:var(--s2);position:relative;}
.th img{width:100%;height:100%;object-fit:cover;display:block;}
.th .tn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hidden{display:none!important;}
.cur-rec{
  background:var(--s2);border:1px solid var(--bd);border-radius:6px;
  padding:8px 10px;font-size:11px;color:var(--tx2);margin-top:8px;
  display:flex;align-items:center;gap:6px;
}
.cur-rec .rec-dot{width:7px;height:7px;border-radius:50%;background:#fbbf24;flex-shrink:0;}
.cur-rec.active .rec-dot{background:var(--ok);}
.cur-rec span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#log{font-size:10px;color:var(--tx2);background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px;margin-top:8px;max-height:80px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;}
</style>
</head>
<body>

<div class="logo">🖼 图片拼图插件</div>
<p class="sub">点击表格中的附件单元格 → 自动加载图片 → 画布编排 → 保存结果</p>

<!-- 配置区 -->
<div class="card">
  <div class="ct">字段配置</div>
  <label>来源字段（附件/图片）</label>
  <select id="sel-src" onchange="onSrcChange()">
    <option value="">-- 加载中 --</option>
  </select>
  <label>保存结果到字段（附件）</label>
  <select id="sel-dst">
    <option value="">-- 加载中 --</option>
  </select>
  <div id="cfg-status" class="hidden"></div>
</div>

<!-- 当前记录状态 -->
<div class="card">
  <div class="ct">当前记录</div>
  <div class="cur-rec" id="cur-rec">
    <div class="rec-dot"></div>
    <span id="cur-rec-txt">请点击表格中任意一行记录</span>
  </div>
  <div id="img-status" class="hidden"></div>
  <div class="tg" id="img-grid"></div>
  <div class="brow" id="editor-btn-row" style="display:none">
    <button class="btn bp bf" onclick="openEditor()">🎨 打开画布编辑器</button>
  </div>
</div>

<div id="log">初始化中...</div>

<script>
// ═══════════════════════════════════════════
// 方案：用 unpkg 的 UMD 版本，直接挂载到 window
// ═══════════════════════════════════════════
const STATE = {
  table: null,
  tableId: null,
  recordId: null,
  images: [],
  srcFieldId: null,
  dstFieldId: null,
};

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

function showSt(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'st ' + type;
  el.innerHTML = '<div class="dot"></div><span>' + msg + '</span>';
  el.classList.remove('hidden');
}

function hideSt(id) {
  document.getElementById(id).classList.add('hidden');
}

// 动态加载 UMD 脚本
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('加载失败: ' + src));
    document.head.appendChild(s);
  });
}

async function init() {
  log('正在加载 SDK...');
  try {
    // 尝试多个 CDN，依次 fallback
    const cdns = [
      'https://unpkg.com/@lark-base-open/js-sdk@0.3.15/dist/js-sdk.umd.js',
      'https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@0.3.15/dist/js-sdk.umd.js',
    ];

    let loaded = false;
    for (const cdn of cdns) {
      try {
        await loadScript(cdn);
        if (window.bitable) { loaded = true; log('✓ SDK 加载成功 from ' + cdn.split('/')[2]); break; }
      } catch(e) { log('CDN失败: ' + cdn.split('/')[2]); }
    }

    if (!loaded || !window.bitable) {
      throw new Error('所有 CDN 均无法访问，请检查网络');
    }

    const bt = window.bitable;

    // 获取当前表
    const table = await bt.base.getActiveTable();
    STATE.table = table;
    STATE.tableId = table.id;
    log('✓ 当前表: ' + table.id);

    // 加载附件字段列表
    await loadFields(table);

    // 监听 selection 变化（点击不同记录自动触发）
    bt.base.onSelectionChange(async ({ data }) => {
      log('selection变化 → record: ' + data.recordId + ', table: ' + data.tableId);

      // 如果切换了表，重新加载字段
      if (data.tableId && data.tableId !== STATE.tableId) {
        STATE.tableId = data.tableId;
        const newTable = await bt.base.getTable(data.tableId);
        STATE.table = newTable;
        await loadFields(newTable);
      }

      // 有 recordId 就自动加载图片
      if (data.recordId) {
        STATE.recordId = data.recordId;
        updateCurRec(data.recordId);
        await loadImages(data.recordId);
      }
    });

    // 检查初始 selection
    const sel = await bt.base.getSelection();
    log('初始selection: record=' + sel.recordId + ', field=' + sel.fieldId);
    if (sel.recordId) {
      STATE.recordId = sel.recordId;
      updateCurRec(sel.recordId);
      await loadImages(sel.recordId);
    }

  } catch(e) {
    log('✗ 初始化失败: ' + e.message);
    showSt('cfg-status', 'er', '初始化失败: ' + e.message);
  }
}

async function loadFields(table) {
  try {
    const fields = await table.getFieldMetaList();
    // 附件字段 type = 17
    const attFields = fields.filter(f => f.type === 17);
    log('附件字段: ' + attFields.map(f=>f.name).join(', '));

    if (!attFields.length) {
      showSt('cfg-status', 'wn', '当前表没有附件字段');
      return;
    }
    hideSt('cfg-status');

    const opts = attFields.map(f =>
      '<option value="' + f.id + '">' + f.name + '</option>'
    ).join('');

    document.getElementById('sel-src').innerHTML = opts;
    document.getElementById('sel-dst').innerHTML = opts;

    // 默认：来源选第1个，目标选第2个（如果只有1个则都选同一个）
    STATE.srcFieldId = attFields[0].id;
    STATE.dstFieldId = attFields.length > 1 ? attFields[1].id : attFields[0].id;
    document.getElementById('sel-src').value = STATE.srcFieldId;
    document.getElementById('sel-dst').value = STATE.dstFieldId;

  } catch(e) {
    log('✗ loadFields: ' + e.message);
  }
}

window.onSrcChange = function() {
  STATE.srcFieldId = document.getElementById('sel-src').value;
  // 重新加载当前记录的图片
  if (STATE.recordId) loadImages(STATE.recordId);
};

function updateCurRec(recordId) {
  const el = document.getElementById('cur-rec');
  const txt = document.getElementById('cur-rec-txt');
  el.classList.add('active');
  txt.textContent = '记录 ID: ' + recordId.slice(0,12) + '…';
}

async function loadImages(recordId) {
  STATE.srcFieldId = document.getElementById('sel-src').value;
  if (!STATE.srcFieldId) { showSt('img-status', 'wn', '请先选择来源字段'); return; }

  document.getElementById('img-grid').innerHTML = '';
  document.getElementById('editor-btn-row').style.display = 'none';
  showSt('img-status', 'if', '加载图片中…');

  try {
    const field = await STATE.table.getField(STATE.srcFieldId);
    const atts = await field.getValue(recordId);

    if (!atts || !atts.length) {
      showSt('img-status', 'wn', '该记录的附件字段为空');
      return;
    }

    const urls = await field.getAttachmentUrls(recordId);
    log('获取到 ' + urls.length + ' 个URL');

    STATE.images = atts
      .map((a, i) => ({
        name: a.name,
        url: urls[i] || '',
        token: a.token,
        size: a.size,
        type: a.type,
        permission: a.permission || null,
      }))
      .filter(x => x.url && x.type && x.type.startsWith('image/'));

    if (!STATE.images.length) {
      showSt('img-status', 'wn', '附件中没有图片（仅支持图片格式）');
      return;
    }

    // 渲染缩略图
    const grid = document.getElementById('img-grid');
    STATE.images.forEach(img => {
      const d = document.createElement('div');
      d.className = 'th';
      d.innerHTML = '<img src="' + img.url + '" loading="lazy"><div class="tn">' + img.name + '</div>';
      grid.appendChild(d);
    });

    showSt('img-status', 'ok', '✓ 已加载 ' + STATE.images.length + ' 张图片');
    document.getElementById('editor-btn-row').style.display = '';
    log('✓ 图片加载完成: ' + STATE.images.length + ' 张');

  } catch(e) {
    log('✗ loadImages: ' + e.message);
    showSt('img-status', 'er', '加载失败: ' + e.message);
  }
}

window.openEditor = function() {
  STATE.dstFieldId = document.getElementById('sel-dst').value;
  if (!STATE.images.length) { alert('没有图片可编辑'); return; }
  if (!STATE.dstFieldId) { alert('请选择保存目标字段'); return; }

  sessionStorage.setItem('collage_images', JSON.stringify(STATE.images));
  sessionStorage.setItem('collage_config', JSON.stringify({
    tableId: STATE.tableId,
    recordId: STATE.recordId,
    dstFieldId: STATE.dstFieldId,
  }));
  window.open('./editor.html', '_blank', 'width=1280,height=800,resizable=yes');
};

// 启动
init();
</script>
</body>
</html>
