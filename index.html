<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片拼图</title>

<!-- 正确方式：用 importmap 声明 SDK 来源，再用 type=module 导入 -->
<script type="importmap">
{
  "imports": {
    "@lark-base-open/js-sdk": "https://esm.sh/@lark-base-open/js-sdk@0.3.15"
  }
}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--bd:#2e2e3e;
  --ac:#4f7cff;--tx:#e8e8f0;--tx2:#8080a8;
  --ok:#34d399;--er:#f87171;--r:8px;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.6;padding:14px;min-height:100vh;}
.logo{font-size:15px;font-weight:700;color:var(--ac);margin-bottom:2px;}
.sub{font-size:11px;color:var(--tx2);margin-bottom:16px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.ct{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
label{display:block;font-size:11px;color:var(--tx2);margin-bottom:3px;margin-top:9px;}
label:first-of-type{margin-top:0;}
select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:7px 9px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
select:focus{border-color:var(--ac);}
select option{background:#1a1a22;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:none;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.bp{background:var(--ac);color:#fff;}
.bp:hover{opacity:.87;}
.bf{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.brow{display:flex;gap:7px;margin-top:11px;}
.st{display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:6px;font-size:11px;margin-top:8px;}
.st.ok{background:#0d2b1e;color:var(--ok);border:1px solid #1a4a33;}
.st.er{background:#2b0d0d;color:var(--er);border:1px solid #4a1a1a;}
.st.if{background:#0f1e38;color:#93c5fd;border:1px solid #1e3a5f;}
.st.wn{background:#2b1d00;color:#fbbf24;border:1px solid #4a3200;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.st.ok .dot{background:var(--ok);}
.st.er .dot{background:var(--er);}
.st.if .dot{background:#93c5fd;}
.st.wn .dot{background:#fbbf24;}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:7px;margin-top:8px;}
.th{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--bd);background:var(--s2);position:relative;}
.th img{width:100%;height:100%;object-fit:cover;display:block;}
.th .tn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-item{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:6px;background:var(--s2);border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
.rec-item:hover,.rec-item.active{border-color:var(--ac);}
.rec-item.active{background:rgba(79,124,255,.1);}
.rec-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.rec-badge{font-size:10px;color:var(--tx2);flex-shrink:0;}
.hidden{display:none!important;}
#log{font-size:10px;color:var(--tx2);background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px;margin-top:8px;max-height:100px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;}
</style>
</head>
<body>

<div class="logo">🖼 图片拼图插件</div>
<p class="sub">从附件字段读取图片 → 画布编排 → 保存结果</p>

<div class="card">
  <div class="ct">① 配置</div>
  <label>数据表</label>
  <select id="sel-table" onchange="onTableChange()"><option value="">-- 初始化中 --</option></select>
  <label>来源字段（附件/图片）</label>
  <select id="sel-src"><option value="">-- 请先选择数据表 --</option></select>
  <label>保存结果到字段（附件）</label>
  <select id="sel-dst"><option value="">-- 请先选择数据表 --</option></select>
  <div id="cfg-status" class="hidden"></div>
</div>

<div class="card hidden" id="rec-card">
  <div class="ct">② 选择记录</div>
  <div id="rec-list"></div>
</div>

<div class="card hidden" id="img-card">
  <div class="ct">③ 已加载图片</div>
  <div class="tg" id="img-grid"></div>
  <div id="img-status" class="hidden"></div>
  <div class="brow">
    <button class="btn bp bf" onclick="openEditor()">🎨 打开画布编辑器</button>
  </div>
</div>

<div id="log">初始化中...</div>

<script type="module">
import { bitable, FieldType } from '@lark-base-open/js-sdk';

// ── 状态 ──────────────────────────────────
const STATE = { table: null, tableId: null, recordId: null, images: [] };
// 暴露给非module脚本使用
window._bitable = bitable;
window._STATE = STATE;

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

function showSt(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'st ' + type;
  el.innerHTML = '<div class="dot"></div><span>' + msg + '</span>';
  el.classList.remove('hidden');
}

// ── 初始化 ────────────────────────────────
async function init() {
  try {
    log('正在连接飞书 SDK...');
    const tables = await bitable.base.getTableMetaList();
    log('✓ 连接成功，数据表数量: ' + tables.length);

    const sel = document.getElementById('sel-table');
    sel.innerHTML = tables.map(t =>
      '<option value="' + t.id + '">' + t.name + '</option>'
    ).join('');

    bitable.base.onSelectionChange(async ({ data }) => {
      if (data.tableId && data.tableId !== STATE.tableId) {
        await loadFields(data.tableId);
      }
      if (data.recordId) {
        const item = document.querySelector('[data-rid="' + data.recordId + '"]');
        if (item) selectRec(data.recordId, item);
      }
    });

    const sel0 = await bitable.base.getSelection();
    if (sel0.tableId) sel.value = sel0.tableId;
    await loadFields(sel0.tableId || tables[0]?.id);

  } catch(e) {
    log('✗ 错误: ' + e.message);
    showSt('cfg-status', 'er', '初始化失败: ' + e.message);
  }
}

async function loadFields(tableId) {
  if (!tableId) return;
  STATE.tableId = tableId;
  document.getElementById('sel-table').value = tableId;
  try {
    const table = await bitable.base.getTable(tableId);
    STATE.table = table;
    const fields = await table.getFieldMetaList();
    const att = fields.filter(f => f.type === FieldType.Attachment);
    log('附件字段: ' + (att.map(f => f.name).join(', ') || '无'));

    const opts = att.length
      ? att.map(f => '<option value="' + f.id + '">' + f.name + '</option>').join('')
      : '<option value="">-- 无附件字段 --</option>';

    document.getElementById('sel-src').innerHTML = opts;
    document.getElementById('sel-dst').innerHTML = opts;
    if (att.length >= 1) document.getElementById('sel-src').value = att[0].id;
    if (att.length >= 2) document.getElementById('sel-dst').value = att[1].id;

    await loadRecs(table);
  } catch(e) {
    log('✗ loadFields: ' + e.message);
  }
}

async function loadRecs(table) {
  document.getElementById('rec-card').classList.remove('hidden');
  const list = document.getElementById('rec-list');
  list.innerHTML = '<div class="st if"><div class="dot"></div><span>加载记录中…</span></div>';
  try {
    const ids = await table.getRecordIdList();
    const show = ids.slice(0, 50);
    list.innerHTML = '';
    show.forEach((rid, i) => {
      const d = document.createElement('div');
      d.className = 'rec-item'; d.dataset.rid = rid;
      d.innerHTML = '<span class="rec-name">记录 ' + (i+1) + '</span><span class="rec-badge" id="b-' + rid + '">…</span>';
      d.onclick = () => selectRec(rid, d);
      list.appendChild(d);
    });
    if (ids.length > 50) {
      list.insertAdjacentHTML('beforeend',
        '<div class="st wn" style="margin-top:6px"><div class="dot"></div><span>仅显示前50条</span></div>');
    }

    // 异步加载图片数量
    const srcId = document.getElementById('sel-src').value;
    if (srcId) {
      const field = await table.getField(srcId);
      for (const rid of show) {
        try {
          const v = await field.getValue(rid);
          const b = document.getElementById('b-' + rid);
          if (b) b.textContent = v ? v.length + '张' : '0张';
        } catch(_) {}
      }
    }

    // 自动选中当前记录
    const sel = await bitable.base.getSelection();
    if (sel.recordId && show.includes(sel.recordId)) {
      const item = list.querySelector('[data-rid="' + sel.recordId + '"]');
      if (item) selectRec(sel.recordId, item);
    }
  } catch(e) {
    log('✗ loadRecs: ' + e.message);
    list.innerHTML = '<div class="st er"><div class="dot"></div><span>' + e.message + '</span></div>';
  }
}

async function selectRec(rid, el) {
  document.querySelectorAll('.rec-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  STATE.recordId = rid;
  await loadImgs(rid);
}

async function loadImgs(recordId) {
  const srcId = document.getElementById('sel-src').value;
  if (!srcId) { showSt('img-status', 'wn', '请先选择来源字段'); return; }
  document.getElementById('img-card').classList.remove('hidden');
  document.getElementById('img-grid').innerHTML = '';
  showSt('img-status', 'if', '加载图片中…');
  try {
    const field = await STATE.table.getField(srcId);
    const atts = await field.getValue(recordId);
    if (!atts || !atts.length) { showSt('img-status', 'wn', '该记录没有附件'); return; }
    const urls = await field.getAttachmentUrls(recordId);
    STATE.images = atts.map((a, i) => ({
      name: a.name, url: urls[i] || '', token: a.token,
      size: a.size, type: a.type, permission: a.permission || null
    })).filter(x => x.url && x.type && x.type.startsWith('image/'));

    if (!STATE.images.length) { showSt('img-status', 'wn', '没有图片类型的附件'); return; }

    const grid = document.getElementById('img-grid');
    STATE.images.forEach(img => {
      const d = document.createElement('div');
      d.className = 'th';
      d.innerHTML = '<img src="' + img.url + '" loading="lazy"><div class="tn">' + img.name + '</div>';
      grid.appendChild(d);
    });
    showSt('img-status', 'ok', '✓ 已加载 ' + STATE.images.length + ' 张图片');
    log('✓ 图片加载完成: ' + STATE.images.length + ' 张');
  } catch(e) {
    log('✗ loadImgs: ' + e.message);
    showSt('img-status', 'er', '加载失败: ' + e.message);
  }
}

// 暴露给普通 script 调用
window.onTableChange = async function() {
  const id = document.getElementById('sel-table').value;
  if (id) await loadFields(id);
};

window.openEditor = function() {
  const dstId = document.getElementById('sel-dst').value;
  if (!STATE.images.length) { alert('请先选择有图片的记录'); return; }
  if (!dstId) { alert('请先选择保存结果的目标字段'); return; }
  sessionStorage.setItem('collage_images', JSON.stringify(STATE.images));
  sessionStorage.setItem('collage_config', JSON.stringify({
    tableId: STATE.tableId,
    recordId: STATE.recordId,
    dstFieldId: dstId,
  }));
  window.open('./editor.html', '_blank', 'width=1280,height=800,resizable=yes');
};

init();
</script>
</body>
</html>
